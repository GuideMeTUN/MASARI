<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Dossier de Carrière</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ECE6D3;
    --paper-alt:#E0D9C2;
    --paper-deep:#D9D1B6;
    --ink:#202F49;
    --ink-soft:#5A5848;
    --seal:#8A3324;
    --seal-tint:#E7D2C7;
    --gold:#967A3F;
    --line:rgba(32,47,73,0.20);
    --shadow:rgba(32,47,73,0.16);
    --radius:10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background:
      radial-gradient(ellipse at top left, rgba(150,122,63,0.07), transparent 55%),
      var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    line-height:1.55;
    min-height:100vh;
  }
  body.lang-ar{ font-family:'IBM Plex Sans Arabic','IBM Plex Sans', sans-serif; }

  .mono{ font-family:'IBM Plex Mono', monospace; }

  a{ color:var(--seal); }

  button{ font-family:inherit; cursor:pointer; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  .ribbon{
    height:5px;
    background:linear-gradient(90deg, var(--seal), var(--gold) 50%, var(--seal));
  }

  .wrap{
    max-width:740px;
    margin:0 auto;
    padding:28px 20px 60px;
  }

  /* ---- top bar ---- */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:28px;
    flex-wrap:wrap;
  }
  .file-tag{
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .lang-switch{
    display:flex;
    gap:6px;
    border:1px solid var(--line);
    border-radius:999px;
    padding:3px;
    background:rgba(255,255,255,0.25);
  }
  .lang-switch button{
    border:none;
    background:transparent;
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:500;
    color:var(--ink-soft);
    transition:background .15s, color .15s;
  }
  .lang-switch button.active{
    background:var(--ink);
    color:var(--paper);
  }

  /* ---- hero ---- */
  .hero{ margin-bottom:30px; }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--seal);
    margin:0 0 10px;
    font-weight:600;
  }
  h1{
    font-size:32px;
    line-height:1.15;
    margin:0 0 14px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-size:16px;
    color:var(--ink-soft);
    max-width:560px;
    margin:0 0 24px;
  }
  .cta-row{ display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .btn-primary{
    background:var(--seal);
    color:var(--paper);
    border:none;
    padding:13px 22px;
    border-radius:var(--radius);
    font-size:15px;
    font-weight:600;
    box-shadow:0 3px 0 rgba(32,47,73,0.25);
    transition:transform .12s;
  }
  .btn-primary:hover{ transform:translateY(-1px); }
  .btn-ghost{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink);
    padding:12px 18px;
    border-radius:var(--radius);
    font-size:14px;
    font-weight:500;
  }
  .btn-ghost:hover{ border-color:var(--ink); }

  /* ---- path chips on intro ---- */
  .chips{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:28px;
  }
  .chip{
    border:1px dashed var(--line);
    border-radius:8px;
    padding:14px 8px;
    text-align:center;
    background:rgba(255,255,255,0.2);
  }
  .chip svg{ width:26px; height:26px; stroke:var(--ink); margin-bottom:8px; }
  .chip-name{ font-size:12px; font-weight:600; line-height:1.3; }

  /* ---- perforation divider ---- */
  .perf{
    height:14px;
    margin:34px 0;
    background-image:radial-gradient(circle, var(--paper) 2.5px, transparent 2.6px);
    background-size:14px 14px;
    background-position:center;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
  }

  /* ---- quiz ---- */
  .progress-row{
    display:flex;
    gap:5px;
    margin-bottom:10px;
  }
  .progress-seg{
    flex:1;
    height:6px;
    border-radius:3px;
    background:rgba(32,47,73,0.12);
  }
  .progress-seg.filled{ background:var(--seal); }
  .progress-label{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:22px;
  }
  .qz-card{
    background:rgba(255,255,255,0.35);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px 22px;
    box-shadow:0 4px 14px var(--shadow);
  }
  .qz-question{
    font-size:19px;
    font-weight:600;
    margin:0 0 20px;
    line-height:1.4;
  }
  .qz-options{ display:flex; flex-direction:column; gap:10px; }
  .qz-option{
    text-align:start;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.5);
    border-radius:8px;
    padding:13px 16px;
    font-size:15px;
    color:var(--ink);
    transition:border-color .12s, background .12s;
  }
  .qz-option:hover{ border-color:var(--gold); }
  .qz-option.selected{
    border-color:var(--seal);
    background:var(--seal-tint);
    font-weight:500;
  }
  .qz-nav{
    display:flex;
    justify-content:space-between;
    margin-top:22px;
  }

  /* ---- results ---- */
  .dossier-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:18px;
    flex-wrap:wrap;
    margin-bottom:22px;
  }
  .stamp{
    width:128px;
    height:128px;
    border-radius:50%;
    border:3px double var(--seal);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transform:rotate(-7deg);
    color:var(--seal);
    flex:none;
    background:rgba(138,51,36,0.05);
  }
  .stamp .pct{ font-size:30px; font-weight:700; line-height:1; }
  .stamp .pct-label{ font-size:9px; letter-spacing:0.08em; text-transform:uppercase; margin-top:2px;}
  .stamp .stamp-name{ font-size:10px; font-weight:600; text-align:center; padding:0 10px; margin-top:4px; line-height:1.2; }

  .bars{ margin:20px 0 26px; display:flex; flex-direction:column; gap:10px; }
  .bar-row{ display:flex; align-items:center; gap:10px; font-size:13px; }
  .bar-label{ width:120px; flex:none; color:var(--ink-soft); }
  .bar-track{ flex:1; height:9px; border-radius:5px; background:rgba(32,47,73,0.10); overflow:hidden; }
  .bar-fill{ height:100%; background:var(--ink-soft); border-radius:5px; }
  .bar-fill.top{ background:var(--seal); }
  .bar-pct{ width:38px; text-align:end; flex:none; }

  .hybrid-note{
    border:1px solid var(--gold);
    background:rgba(150,122,63,0.08);
    border-radius:8px;
    padding:12px 16px;
    font-size:14px;
    margin-bottom:26px;
  }

  .section-label{
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--seal);
    font-weight:600;
    margin:0 0 8px;
  }
  .overview-text{ font-size:15px; margin:0 0 26px; }

  .tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:18px; flex-wrap:wrap; }
  .tab-btn{
    background:none;
    border:none;
    padding:10px 14px;
    font-size:13.5px;
    font-weight:500;
    color:var(--ink-soft);
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  .tab-btn.active{ color:var(--ink); border-bottom-color:var(--seal); font-weight:600; }
  .tab-panel{ font-size:15px; margin-bottom:28px; }

  .steps-list{ list-style:none; margin:0 0 28px; padding:0; display:flex; flex-direction:column; gap:10px; }
  .steps-list li{ display:flex; gap:12px; font-size:15px; align-items:baseline; }
  .step-num{ font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--seal); flex:none; width:22px; }

  .resources-list{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:30px; }
  .resource-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    border:1px solid var(--line);
    border-radius:5px;
    padding:5px 10px;
    background:rgba(255,255,255,0.4);
  }

  .accordion-item{ border:1px solid var(--line); border-radius:8px; margin-bottom:10px; overflow:hidden; }
  .accordion-head{
    width:100%;
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px;
    background:rgba(255,255,255,0.3);
    border:none;
    font-size:15px;
    font-weight:600;
    text-align:start;
  }
  .accordion-head svg{ width:20px; height:20px; stroke:var(--ink); flex:none; }
  .accordion-chevron{ margin-inline-start:auto; transition:transform .15s; }
  .accordion-item.open .accordion-chevron{ transform:rotate(90deg); }
  .accordion-body{ padding:0 18px 18px; display:none; }
  .accordion-item.open .accordion-body{ display:block; }

  .restart-row{ margin-top:10px; margin-bottom:30px; }

  .save-row{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-top:16px;
    margin-bottom:30px;
  }
  .btn-save{
    background:transparent;
    border:1.5px solid var(--gold);
    color:var(--gold);
    padding:10px 18px;
    border-radius:var(--radius);
    font-size:14px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:7px;
    transition:background .12s, color .12s;
  }
  .btn-save:hover{ background:var(--gold); color:var(--paper); }
  .btn-save.saved{ background:var(--gold); color:var(--paper); }
  .save-note{ font-size:13px; color:var(--ink-soft); font-style:italic; }
  .saved-banner{
    border:1px solid var(--gold);
    background:rgba(150,122,63,0.08);
    border-radius:8px;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-bottom:24px;
    flex-wrap:wrap;
  }
  .saved-banner-text{ font-size:14px; color:var(--ink); }
  .saved-banner-text strong{ display:block; font-size:15px; margin-bottom:2px; }

  .signals-box{
    border:1px solid var(--line);
    background:rgba(255,255,255,0.3);
    border-radius:8px;
    padding:16px 18px;
    margin-bottom:26px;
  }

  /* ---- section header in quiz ---- */
  .sec-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }
  .sec-dots{ display:flex; gap:5px; }
  .sec-dot{
    width:9px; height:9px; border-radius:50%;
    background:rgba(32,47,73,0.15);
  }
  .sec-dot.active{ background:var(--seal); }
  .sec-dot.done{ background:var(--gold); }
  .sec-name{ font-size:12px; font-weight:600; color:var(--ink-soft); letter-spacing:0.06em; text-transform:uppercase; }

  /* ---- timeline ---- */
  .timeline{ display:flex; flex-direction:column; gap:0; margin-bottom:28px; }
  .tl-item{ display:flex; gap:0; }
  .tl-left{
    display:flex; flex-direction:column; align-items:center;
    width:36px; flex:none;
  }
  .tl-dot{
    width:13px; height:13px; border-radius:50%;
    border:2px solid var(--seal); background:var(--paper);
    flex:none; margin-top:3px;
  }
  .tl-line{ width:2px; background:var(--line); flex:1; min-height:20px; }
  .tl-content{ padding-bottom:22px; padding-inline-start:4px; flex:1; }
  .tl-period{ font-size:12px; font-weight:700; color:var(--seal); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px; }
  .tl-actions{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px; }
  .tl-actions li{ font-size:14px; padding-inline-start:12px; position:relative; color:var(--ink); }
  .tl-actions li::before{ content:'–'; position:absolute; inset-inline-start:0; color:var(--ink-soft); }

  /* ---- legal checklist ---- */
  .legal-list{ list-style:none; margin:0 0 26px; padding:0; display:flex; flex-direction:column; gap:8px; }
  .legal-list li{ display:flex; gap:10px; font-size:14px; align-items:baseline; }
  .legal-check{ color:var(--seal); font-size:13px; flex:none; }

  /* ---- watch-out box ---- */
  .watchout-box{
    border-inline-start:3px solid var(--seal);
    background:rgba(138,51,36,0.04);
    padding:14px 16px;
    border-radius:0 8px 8px 0;
    margin-bottom:26px;
  }
  .watchout-list{ list-style:none; margin:4px 0 0; padding:0; display:flex; flex-direction:column; gap:6px; }
  .watchout-list li{ font-size:14px; padding-inline-start:14px; position:relative; }
  .watchout-list li::before{ content:'!'; font-weight:700; color:var(--seal); position:absolute; inset-inline-start:0; }

  /* ---- plan B ---- */
  .planb-box{
    border:1px dashed var(--gold);
    border-radius:8px;
    padding:14px 18px;
    margin-bottom:28px;
    font-size:14px;
    background:rgba(150,122,63,0.05);
  }

  footer{
    border-top:1px solid var(--line);
    padding-top:18px;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  footer p{ margin:0 0 6px; }

  @media (max-width:560px){
    h1{ font-size:26px; }
    .chips{ grid-template-columns:repeat(2,1fr); }
    .stamp{ width:104px; height:104px; }
    .stamp .pct{ font-size:24px; }
    .bar-label{ width:88px; font-size:12px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }

  [hidden]{ display:none !important; }
</style>
</head>

const PATH_ORDER = ['etat','prive','entre','indep'];
const STORAGE_KEY = 'massar-results-v1';

// ---- Storage helpers (window.storage in Claude.ai, localStorage elsewhere) ----
async function saveResults(){
  var payload = JSON.stringify({ answers: state.answers, lang: state.lang, dossierNumber: state.dossierNumber, savedAt: new Date().toISOString() });
  try {
    if(window.storage && typeof window.storage.set === 'function'){
      await window.storage.set(STORAGE_KEY, payload);
    } else {
      localStorage.setItem(STORAGE_KEY, payload);
    }
    return true;
  } catch(e){ return false; }
}
async function loadSavedResults(){
  try {
    if(window.storage && typeof window.storage.get === 'function'){
      var result = await window.storage.get(STORAGE_KEY);
      if(!result) return null;
      return JSON.parse(result.value);
    } else {
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      return JSON.parse(raw);
    }
  } catch(e){ return null; }
}
async function clearSavedResults(){
  try {
    if(window.storage && typeof window.storage.delete === 'function'){
      await window.storage.delete(STORAGE_KEY);
    } else {
      localStorage.removeItem(STORAGE_KEY);
    }
  } catch(e){}
}

function t(key){ return TEXT[state.lang][key]; }

function computeMaxPossible(){
  const max = { etat:0, prive:0, entre:0, indep:0 };
  QUESTIONS.forEach(function(q){
    const qmax = { etat:0, prive:0, entre:0, indep:0 };
    q.options.forEach(function(opt){
      Object.keys(qmax).forEach(function(k){ if(opt.score[k] > qmax[k]) qmax[k] = opt.score[k]; });
    });
    Object.keys(max).forEach(function(k){ max[k] += qmax[k]; });
  });
  return max;
}

function computeScores(){
  const score = { etat:0, prive:0, entre:0, indep:0 };
  state.answers.forEach(function(optIdx, qIdx){
    if(optIdx === null || optIdx === undefined) return;
    const opt = QUESTIONS[qIdx].options[optIdx];
    Object.keys(score).forEach(function(k){ score[k] += opt.score[k]; });
  });
  return score;
}

function computePercentages(){
  const score = computeScores();
  const max = computeMaxPossible();
  const pct = {};
  Object.keys(score).forEach(function(k){ pct[k] = max[k] ? Math.round(score[k] / max[k] * 100) : 0; });
  return pct;
}

function getTopSignals(topPath, count){
  // Collect answers that gave >= 2 pts to the top path, ranked by score descending
  var signals = [];
  state.answers.forEach(function(optIdx, qIdx){
    if(optIdx == null || optIdx === undefined) return;
    var opt = QUESTIONS[qIdx].options[optIdx];
    var sc = opt.score[topPath];
    if(sc >= 2){
      signals.push({
        qIdx: qIdx,
        optIdx: optIdx,
        score: sc,
        questionText: QUESTIONS[qIdx].text[state.lang],
        answerText: opt.text[state.lang]
      });
    }
  });
  signals.sort(function(a,b){ return b.score - a.score; });
  return signals.slice(0, count);
}

function updateChrome(){

  });

  document.documentElement.lang = state.lang;
  document.documentElement.dir = state.lang === 'ar' ? 'rtl' : 'ltr';

function render(){
  updateChrome();
  const app = document.getElementById('app');
  if(state.screen === 'intro') app.innerHTML = renderIntro();
  else if(state.screen === 'quiz') app.innerHTML = renderQuiz();
  else if(state.screen === 'results') app.innerHTML = renderResults();
  else if(state.screen === 'guide') app.innerHTML = renderGuide();
}

function handleClick(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  if(action === 'set-lang'){
    state.lang = el.dataset.lang;
    render();
    return;
  }
  if(action === 'start'){
    state.screen = 'quiz';
    state.currentQuestion = 0;
    state.answers = [];
    render();
    return;
  }
  if(action === 'explore'){
    state.screen = 'guide';
    render();
    return;
  }
  if(action === 'select-option'){
    state.answers[state.currentQuestion] = parseInt(el.dataset.oindex, 10);
    render();
    return;
  }
  if(action === 'next'){
    if(state.answers[state.currentQuestion] == null) return;
    if(state.currentQuestion < QUESTIONS.length - 1){
      state.currentQuestion++;
      render();
    } else {
      state.resultTab = 'academic';
      state.openAccordion = null;
      state.screen = 'results';
      render();
    }
    return;
  }
  if(action === 'back'){
    if(state.currentQuestion > 0){
      state.currentQuestion--;
      render();
    }
    return;
  }
  if(action === 'set-tab'){
    const scope = el.dataset.scope, path = el.dataset.path, tab = el.dataset.tab;
    if(scope === 'result') state.resultTab = tab;
    else state.guideTabs[path] = tab;
    render();
    return;
  }
  if(action === 'toggle-accordion'){
    const path = el.dataset.path;
    state.openAccordion = state.openAccordion === path ? null : path;
    render();
    return;
  }
  if(action === 'restart'){
    state.screen = 'intro';
    state.currentQuestion = 0;
    state.answers = [];
    state.justSaved = false;
    render();
    return;
  }
  if(action === 'save-results'){
    saveResults().then(function(ok){
      if(ok){
        state.justSaved = true;
        state.savedSnapshot = { answers: state.answers.slice(), lang: state.lang, dossierNumber: state.dossierNumber };
        render();
      }
    });
    return;
  }
  if(action === 'load-results'){
    if(state.savedSnapshot){
      state.answers = state.savedSnapshot.answers.slice();
      state.dossierNumber = state.savedSnapshot.dossierNumber;
      state.resultTab = 'academic';
      state.openAccordion = null;
      state.justSaved = true;
      state.screen = 'results';
      render();
    }
    return;
  }
}

  document.querySelector('.wrap').addEventListener('click', handleClick);
  loadSavedResults().then(function(saved){
    if(saved && saved.answers && saved.answers.length === QUESTIONS.length){
      state.savedSnapshot = saved;
    }
    render();
  });
});
